<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rapid 1 — Sick / not sick triage</title><link rel="stylesheet" href="style.css"></head>
<body><div class="wrap">
<div class="row" style="justify-content:space-between"><h1>Rapid recognition — triage</h1><span class="pill" id="tone">attending tone · 78%</span></div>
<div class="row" style="gap:14px;margin:8px 0">
  <span class="muted">streak <b id="streak" style="color:var(--text-primary)">0</b></span>
  <span class="muted">accuracy <b id="acc" style="color:var(--text-primary)">–</b></span>
  <span class="muted">avg call <b id="avg" style="color:var(--text-primary)">–</b></span>
</div>
<div style="height:6px;background:var(--surface-1);border-radius:6px;overflow:hidden"><div id="bar" style="height:100%;width:100%;background:var(--text-accent)"></div></div>
<div class="soft" style="margin-top:10px"><div id="stem" class="sec" style="margin-bottom:4px"></div><div id="strip"></div><div id="reveal" style="min-height:18px;margin-top:4px;font-size:13px;font-weight:500"></div></div>
<div class="row" id="acts" style="margin-top:12px"><button class="danger" data-v="act">Sick — act now</button><button data-v="workup">Worrisome — work up</button><button class="success" data-v="safe">Not sick</button></div>
<div id="fb" style="min-height:24px;margin-top:8px"></div>
</div>
<script src="shared.js"></script>
<script>
var cases=[
 {stem:"58M — palpitations, lightheaded, BP 88/54.",gen:"vt",correct:"act",dx:"Ventricular tachycardia",why:"Wide, fast, regular, monomorphic — VT until proven otherwise. Pads on, call for help."},
 {stem:"79F — syncope, pulse 38.",gen:"chb",correct:"act",dx:"Complete (3rd-degree) AV block",why:"P's march independent of the QRS. Pacer pads, atropine, call cardiology."},
 {stem:"24M — anxiety, vitals normal.",gen:"sinus",correct:"safe",dx:"Normal sinus rhythm",why:"Narrow QRS, P before every QRS, ~75. Reassure — over-triaging this is how you burn a cath lab."},
 {stem:"68F — palpitations, irregular pulse ~150.",gen:"afib",correct:"workup",dx:"Atrial fibrillation with RVR",why:"Irregularly irregular, no P's. Rate-control + anticoagulation workup; not a crash unless unstable."}
];
var i=-1,t0,timer,times=[],ok=0,n=0,streak=0;
var bar=document.getElementById('bar'),strip=document.getElementById('strip'),fb=document.getElementById('fb');
function stat(){document.getElementById('streak').textContent=streak;document.getElementById('acc').textContent=n?Math.round(100*ok/n)+'%':'–';document.getElementById('avg').textContent=times.length?(times.reduce(function(a,b){return a+b},0)/times.length).toFixed(1)+'s':'–';}
function btns(on){document.querySelectorAll('#acts button').forEach(function(b){b.disabled=!on;});}
function next(){i=(i+1)%cases.length;var c=cases[i];document.getElementById('stem').textContent=c.stem;document.getElementById('reveal').textContent='';fb.innerHTML='';strip.innerHTML=ECG.strip(c.gen,{w:640,h:120});btns(true);
 t0=Date.now();bar.style.transition='none';bar.style.width='100%';bar.style.background='var(--text-accent)';setTimeout(function(){bar.style.transition='width 10s linear';bar.style.width='0%';},30);clearTimeout(timer);timer=setTimeout(function(){answer(null);},10000);}
function answer(v){clearTimeout(timer);var c=cases[i],el=Date.now()-t0;bar.style.transition='none';bar.style.width=(100*Math.max(0,1-el/10000))+'%';btns(false);n++;var good=v===c.correct;if(good){ok++;streak++;}else streak=0;if(v!==null)times.push(el/1000);
 document.getElementById('reveal').innerHTML='<span class="sec">finding:</span> '+c.dx;
 var msg,cls;if(v===null){msg="Too slow — in a real arrest the clock doesn't wait. "+c.why;cls='warn';}else if(good){msg="Correct. "+c.why;cls='ok';}else if(c.correct=='safe'&&v=='act'){msg="Over-triage. "+c.why;cls='warn';}else{msg="Reconsider. "+c.why;cls='bad';}
 fb.innerHTML='<div class="fb '+cls+'">'+msg+' <span class="sec">· '+(el/1000).toFixed(1)+'s</span></div>';stat();setTimeout(next,2600);}
document.querySelectorAll('#acts button').forEach(function(b){b.onclick=function(){answer(b.getAttribute('data-v'));};});
next();
</script></body></html>
