<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tutorial A — Guided discovery (bundle branch blocks)</title><link rel="stylesheet" href="style.css"></head>
<body><div class="wrap">
<div class="row" style="justify-content:space-between"><div><h1>Bundle branch blocks</h1><div class="muted">Tutorial A · guided discovery — measure it, compare it, name it</div></div>
<div><span class="muted">your level</span> <span class="seg" id="lvl"><button data-l="new">New</button><button data-l="building" class="accent">Building</button><button data-l="strong">Strong</button></span></div></div>
<div class="grid2" style="margin-top:12px">
  <div class="soft">
    <div class="sec">Lead V1 <span id="caltip" style="color:var(--text-accent)"></span></div>
    <svg id="v1" viewBox="0 0 300 96" style="cursor:crosshair;touch-action:none" role="img" aria-label="Lead V1 rSR">
      <g stroke="var(--grid)" stroke-width="0.6"><line x1="0" y1="20" x2="300" y2="20"/><line x1="0" y1="50" x2="300" y2="50"/><line x1="0" y1="80" x2="300" y2="80"/></g>
      <polyline points="6,50 60,50 70,45 80,50 96,40 106,70 121,28 136,50 160,42 178,50 300,50" fill="none" stroke="var(--trace)" stroke-width="1.7" stroke-linejoin="round"/><g id="cm"></g></svg>
    <div class="sec" style="margin-top:8px">Lead V6</div>
    <svg viewBox="0 0 300 70" role="img" aria-label="Lead V6 wide S"><line x1="0" y1="35" x2="300" y2="35" stroke="var(--grid)" stroke-width="0.6"/>
      <polyline points="6,35 64,35 74,31 86,35 100,16 120,60 145,35 170,29 186,35 300,35" fill="none" stroke="var(--trace)" stroke-width="1.7" stroke-linejoin="round"/></svg>
    <div id="cmp" style="margin-top:10px"></div>
  </div>
  <div class="card" style="display:flex;flex-direction:column;min-height:300px"><div id="conv" class="chat" style="flex:1;overflow:auto"></div></div>
</div></div>
<script>
var conv=document.getElementById('conv'),v1=document.getElementById('v1'),cm=document.getElementById('cm'),caltip=document.getElementById('caltip'),cmp=document.getElementById('cmp');
var level="building",clicks=[],armed=false,MS=3.0;
function ai(h){var d=document.createElement('div');d.className='msg ai';d.innerHTML='<span class="who">AI tutor</span><div class="body">'+h+'</div>';conv.appendChild(d);conv.scrollTop=1e9;}
function you(t){var d=document.createElement('div');d.className='msg you';d.innerHTML='<span class="who">You</span><div class="body">'+t+'</div>';conv.appendChild(d);conv.scrollTop=1e9;}
function ch(o){var w=document.createElement('div');w.className='row';o.forEach(function(x){var b=document.createElement('button');if(x.cls)b.className=x.cls;b.innerHTML=x.label;b.onclick=function(){w.remove();if(x.say)you(x.say);x.go();};w.appendChild(b);});conv.appendChild(w);}
function sx(e){var r=v1.getBoundingClientRect();return (e.clientX-r.left)/r.width*300;}
v1.addEventListener('pointerdown',function(e){if(!armed)return;var x=Math.max(0,Math.min(300,sx(e)));clicks.push(x);var l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x);l.setAttribute('x2',x);l.setAttribute('y1',8);l.setAttribute('y2',88);l.setAttribute('stroke','var(--text-accent)');l.setAttribute('stroke-width',1.5);cm.appendChild(l);if(clicks.length==2){armed=false;v1.style.cursor='default';meas(Math.round(Math.abs(clicks[1]-clicks[0])*MS));}else caltip.textContent='now click the end of the QRS';});
function arm(){armed=true;clicks=[];cm.innerHTML='';v1.style.cursor='crosshair';caltip.textContent='click the start of the QRS';}
function meas(ms){caltip.textContent=ms+' ms';you('measured QRS ≈ '+ms+' ms');if(ms>=110&&ms<=210){ai("Right — ~"+ms+" ms, that's wide (≥120). You measured it, so it's yours now. The shape tells you <em>which</em> bundle. Your read?");read();}else{ai(ms<110?"That only caught part of it — calipers on the very start and end of the QRS.":"A touch wide — you grabbed some T too. Tighten to just the QRS.");arm();}}
function compare(){cmp.innerHTML='<div class="grid2" style="gap:8px"><div class="card" style="padding:6px"><div class="sec">RBBB — this case</div>'+lead('rbbb1')+lead('rbbb6')+'</div><div class="card" style="padding:6px"><div class="sec">LBBB — contrast</div>'+lead('lbbb1')+lead('lbbb6')+'</div></div><div class="sec" style="margin-top:6px">V1: RBBB up (rSR′) vs LBBB down (deep QS) · V6: RBBB wide S vs LBBB broad notched R.</div>';ai("There — side by side. V1 up vs down, V6 S vs R. That mirror <em>is</em> the distinction.");}
function lead(k){var P={rbbb1:"4,30 40,30 47,26 54,30 64,22 70,44 80,14 90,30 110,24 124,30 150,30",rbbb6:"4,30 44,30 52,27 60,30 70,16 86,52 104,30 124,24 140,30 150,30",lbbb1:"4,24 40,24 48,22 56,24 66,26 80,56 98,52 110,30 128,26 150,26",lbbb6:"4,32 40,32 50,30 60,18 72,12 82,20 92,14 104,30 124,28 150,30"};var L={rbbb1:"V1",rbbb6:"V6",lbbb1:"V1",lbbb6:"V6"};return '<svg viewBox="0 0 150 60" role="img" aria-label="'+k+'"><line x1="0" y1="30" x2="150" y2="30" stroke="var(--grid)" stroke-width="0.6"/><text x="3" y="12" style="font-size:10px;fill:var(--text-secondary)">'+L[k]+'</text><polyline points="'+P[k]+'" fill="none" stroke="var(--trace)" stroke-width="1.4" stroke-linejoin="round"/></svg>';}
function read(){var w=document.createElement('div');w.className='row';[['RBBB',principle],['LBBB',wrongL],['Not sure',unsure]].forEach(function(o){var b=document.createElement('button');b.textContent=o[0];b.onclick=function(){w.remove();you(o[0]);o[1]();};w.appendChild(b);});var cb=document.createElement('button');cb.textContent='Compare with LBBB';cb.onclick=compare;w.appendChild(cb);conv.appendChild(w);}
function wrongL(){ai("Hold on — classic mix-up, so let's look, not argue.");compare();ai("In LBBB V1 is mostly <em>negative</em>; here V1 points up (rSR′). So?");ch([{label:'RBBB',say:'RBBB — I see it',go:principle},{label:'Still unsure',go:function(){ai("V1 only: up-and-late = right. Down-and-broad = left.");ch([{label:'RBBB',go:principle}]);}}]);}
function unsure(){ai("Pull up the comparison and look at V1 in both.");compare();ch([{label:"OK — it's RBBB",go:principle}]);}
function principle(){ai("<div class='fb ok'><b>RBBB</b> = rSR′ in V1 + wide slurred S in I/V6, QRS ≥120 ms. Right ventricle fires <em>late</em>, so terminal forces go right.</div>");ch([{label:'Next — the trap',go:pitfall}]);}
function pitfall(){ai("A wide QRS isn't automatically a bundle. What <em>else</em> widens it?");ch([{label:'Hyperkalemia',go:done},{label:'Paced',go:done},{label:'WPW',go:done},{label:'All of these',go:done}]);}
function done(){ai("Right — anchor on V1/V6 <em>morphology</em>, not width alone. <div class='fb ok' style='margin-top:6px'>Mastery ↑. Next: an LBBB case you call solo.</div>");}
function start(){conv.innerHTML='';cmp.innerHTML='';cm.innerHTML='';caltip.textContent='';
  if(level=='strong'){ai("You've got this — call it cold.");ch([{label:'RBBB',say:'RBBB',go:function(){ai("Correct. Only thing worth your time here:");pitfall();}},{label:'LBBB',say:'LBBB',go:function(){ai("No — V1 is positive (rSR′). Recalibrate, move on.");pitfall();}}]);}
  else if(level=='new'){ai("Slow and steady — 72-year-old, new palpitations. First just measure: drag calipers across the QRS in V1 (click its start, then end). I'm right here.");arm();}
  else{ai("72-year-old, palpitations. Measure the QRS in V1 (click start, then end), then we'll name it.");arm();}}
document.querySelectorAll('#lvl button').forEach(function(b){b.onclick=function(){document.querySelectorAll('#lvl button').forEach(function(x){x.classList.remove('accent');});b.classList.add('accent');level=b.getAttribute('data-l');start();};});
start();
</script></body></html>
