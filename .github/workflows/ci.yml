name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ECG_TEST_USE_CI_CORPUS: "1"
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements-data.txt
      - name: Install test dependencies
        run: python -m pip install --requirement backend/requirements-dev.txt --requirement backend/requirements-data.txt
      - name: Exercise every authentication email through local SMTP
        run: python scripts/smoke_auth_email_local.py
      - name: Run backend test suite
        working-directory: backend
        run: python -m pytest tests --quiet

  frontend:
    name: Frontend lint, types, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL: "1"
      ECG_BACKEND_API_BASE: "https://api.example.invalid"
      ECG_ORIGIN_SHARED_SECRET: "ci-only-origin-secret-000000000000000000000000"
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
      - name: Build hosted frontend
        working-directory: frontend
        run: npm run build

  e2e:
    name: Student-flow Playwright gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked application dependencies
        run: |
          python -m pip install --requirement backend/requirements.txt
          npm ci --prefix frontend
      - name: Verify and extract the real-PTB CI corpus
        run: |
          mkdir -p "${RUNNER_TEMP}/ecg-ci-corpus"
          (cd backend/tests/assets && sha256sum --check ptb_ci_corpus.tar.gz.sha256)
          tar -xzf backend/tests/assets/ptb_ci_corpus.tar.gz -C "${RUNNER_TEMP}/ecg-ci-corpus"
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start isolated backend
        working-directory: backend
        env:
          # Stateful mode suites use the internal credential fixture and a
          # fresh database; registration and verification behavior is covered
          # separately by the email-auth browser and backend contract tests.
          APP_ENV: test
          DATABASE_URL: sqlite:///${{ runner.temp }}/ecg-e2e.sqlite3
          ECG_CORPUS_ROOT: ${{ runner.temp }}/ecg-ci-corpus
          ECG_REQUIRE_REAL_DATA: "0"
          ECG_MIN_CLINICAL_CASES: "100"
          LLM_PROVIDER: mock
        run: |
          python -m uvicorn app.main:app \
            --host 127.0.0.1 --port 8000 --no-proxy-headers \
            >"${RUNNER_TEMP}/ecg-e2e-backend.log" 2>&1 &
          echo "$!" >"${RUNNER_TEMP}/ecg-e2e-backend.pid"
          for _ in {1..60}; do
            curl --silent --fail http://127.0.0.1:8000/livez >/dev/null && exit 0
            sleep 1
          done
          cat "${RUNNER_TEMP}/ecg-e2e-backend.log"
          exit 1
      - name: Run complete Playwright suite
        working-directory: frontend
        env:
          E2E_BACKEND_BASE: http://localhost:8000
          # The checked fixture contains 103 encounter ECGs plus three authentic
          # longitudinal priors, not the 22,497-ECG release corpus or Leipzig windows.
          E2E_CORPUS_PROFILE: compact-clinical
        run: npm run e2e
      - name: Report backend log
        if: always()
        run: tail -n 300 "${RUNNER_TEMP}/ecg-e2e-backend.log" || true
      - name: Stop isolated backend
        if: always()
        run: |
          test ! -f "${RUNNER_TEMP}/ecg-e2e-backend.pid" \
            || kill "$(cat "${RUNNER_TEMP}/ecg-e2e-backend.pid")" \
            || true

  deployment:
    name: Deployment package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.9.8"
      - name: Check Terraform formatting
        run: terraform -chdir=deploy/gcp/terraform fmt -check -recursive
      - name: Initialize Terraform without remote state
        run: terraform -chdir=deploy/gcp/terraform init -backend=false -input=false
      - name: Validate Terraform
        run: terraform -chdir=deploy/gcp/terraform validate
      - name: Check shell syntax
        run: find deploy/gcp/scripts deploy/gcp/tests -type f -name "*.sh" -print0 | xargs -0 -r -n1 bash -n
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck sqlite3 util-linux
      - name: Run ShellCheck
        run: find deploy/gcp/scripts deploy/gcp/tests -type f -name "*.sh" -print0 | xargs -0 -r shellcheck --severity=warning
      - name: Exercise SQLite backup and restore
        run: sudo bash deploy/gcp/tests/backup_restore_regression.sh
      - name: Build backend image
        run: |
          docker build \
            --build-arg "VCS_REF=${GITHUB_SHA}" \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --file backend/Dockerfile \
            --tag ecg-backend:ci \
            backend
      - name: Smoke-test non-root read-only image
        run: |
          test "$(docker image inspect ecg-backend:ci --format "{{.Config.User}}")" = "10001:10001"
          docker run --rm \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=16m \
            ecg-backend:ci \
            python -c "import os; assert os.getuid() == 10001; from app.config import Settings; Settings(); import app.ops, app.origin_guard"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
