name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ECG_TEST_USE_CI_CORPUS: "1"
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements-data.txt
      - name: Install test dependencies
        run: python -m pip install --requirement backend/requirements-dev.txt --requirement backend/requirements-data.txt
      - name: Run backend test suite
        working-directory: backend
        run: python -m pytest tests --quiet

  frontend:
    name: Frontend lint, types, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL: "1"
      ECG_BACKEND_API_BASE: "https://api.example.invalid"
      ECG_ORIGIN_SHARED_SECRET: "ci-only-origin-secret-000000000000000000000000"
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
      - name: Build hosted frontend
        working-directory: frontend
        run: npm run build

  deployment:
    name: Deployment package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.9.8"
      - name: Check Terraform formatting
        run: terraform -chdir=deploy/gcp/terraform fmt -check -recursive
      - name: Initialize Terraform without remote state
        run: terraform -chdir=deploy/gcp/terraform init -backend=false -input=false
      - name: Validate Terraform
        run: terraform -chdir=deploy/gcp/terraform validate
      - name: Check shell syntax
        run: find deploy/gcp/scripts -type f -name "*.sh" -print0 | xargs -0 -r -n1 bash -n
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - name: Run ShellCheck
        run: find deploy/gcp/scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck --severity=warning
      - name: Build backend image
        run: |
          docker build \
            --build-arg "VCS_REF=${GITHUB_SHA}" \
            --build-arg "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --file backend/Dockerfile \
            --tag ecg-backend:ci \
            backend
      - name: Smoke-test non-root read-only image
        run: |
          test "$(docker image inspect ecg-backend:ci --format "{{.Config.User}}")" = "10001:10001"
          docker run --rm \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=16m \
            ecg-backend:ci \
            python -c "import os; assert os.getuid() == 10001; from app.config import Settings; Settings(); import app.ops, app.origin_guard"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
